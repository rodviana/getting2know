# Produção — VPS com domínio getting2know.com.br
#
#   cp .env.prod.example .env.prod   # editar segredos
#   docker compose -f docker-compose.prod.yml --env-file .env.prod up --build -d
#
# Postgres e API ficam só na rede interna do Docker.
# O client escuta em 127.0.0.1:3000 — Caddy na VPS faz HTTPS e proxy.

services:
  postgres:
    image: postgres:15-alpine
    container_name: getting2know-db
    environment:
      POSTGRES_DB: getting2know
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./server/src/main/resources/database/V001_schema_users.sql:/docker-entrypoint-initdb.d/10-V001_schema_users.sql:ro
      - ./server/src/main/resources/database/V008_schema_admin_activity.sql:/docker-entrypoint-initdb.d/11-V008_schema_admin_activity.sql:ro
      - ./server/src/main/resources/database/P_FIND_USER_BY_EMAIL.sql:/docker-entrypoint-initdb.d/20-P_FIND_USER_BY_EMAIL.sql:ro
      - ./server/src/main/resources/database/P_FIND_USER_BY_ID.sql:/docker-entrypoint-initdb.d/25-P_FIND_USER_BY_ID.sql:ro
      - ./server/src/main/resources/database/P_CREATE_USER.sql:/docker-entrypoint-initdb.d/26-P_CREATE_USER.sql:ro
      - ./server/src/main/resources/database/V002_seed_demo.sql:/docker-entrypoint-initdb.d/30-V002_seed_demo.sql:ro
      - ./server/src/main/resources/database/V009_seed_admin.sql:/docker-entrypoint-initdb.d/31-V009_seed_admin.sql:ro
      - ./server/src/main/resources/database/V003_schema_questions_sessions.sql:/docker-entrypoint-initdb.d/40-V003_schema_questions_sessions.sql:ro
      - ./server/src/main/resources/database/V004_session_format.sql:/docker-entrypoint-initdb.d/41-V004_session_format.sql:ro
      - ./server/src/main/resources/database/V005_system_questions.sql:/docker-entrypoint-initdb.d/42-V005_system_questions.sql:ro
      - ./server/src/main/resources/database/V006_seed_default_questions.sql:/docker-entrypoint-initdb.d/43-V006_seed_default_questions.sql:ro
      - ./server/src/main/resources/database/V007_seed_default_questions.sql:/docker-entrypoint-initdb.d/44-V007_seed_default_questions.sql:ro
      - ./server/src/main/resources/database/P_LIST_QUESTIONS_BY_USER_ID.sql:/docker-entrypoint-initdb.d/50-P_LIST_QUESTIONS_BY_USER_ID.sql:ro
      - ./server/src/main/resources/database/P_FIND_QUESTION_BY_ID.sql:/docker-entrypoint-initdb.d/51-P_FIND_QUESTION_BY_ID.sql:ro
      - ./server/src/main/resources/database/P_CREATE_QUESTION.sql:/docker-entrypoint-initdb.d/52-P_CREATE_QUESTION.sql:ro
      - ./server/src/main/resources/database/P_UPDATE_QUESTION.sql:/docker-entrypoint-initdb.d/53-P_UPDATE_QUESTION.sql:ro
      - ./server/src/main/resources/database/P_DELETE_QUESTION.sql:/docker-entrypoint-initdb.d/54-P_DELETE_QUESTION.sql:ro
      - ./server/src/main/resources/database/P_CREATE_PAIR_SESSION.sql:/docker-entrypoint-initdb.d/60-P_CREATE_PAIR_SESSION.sql:ro
      - ./server/src/main/resources/database/P_FIND_PAIR_SESSION_BY_CODE.sql:/docker-entrypoint-initdb.d/61-P_FIND_PAIR_SESSION_BY_CODE.sql:ro
      - ./server/src/main/resources/database/P_JOIN_PAIR_SESSION.sql:/docker-entrypoint-initdb.d/62-P_JOIN_PAIR_SESSION.sql:ro
      - ./server/src/main/resources/database/P_START_PAIR_SESSION.sql:/docker-entrypoint-initdb.d/63-P_START_PAIR_SESSION.sql:ro
      - ./server/src/main/resources/database/P_UPDATE_PAIR_SESSION_STATUS.sql:/docker-entrypoint-initdb.d/64-P_UPDATE_PAIR_SESSION_STATUS.sql:ro
      - ./server/src/main/resources/database/P_INSERT_SESSION_QUESTION.sql:/docker-entrypoint-initdb.d/65-P_INSERT_SESSION_QUESTION.sql:ro
      - ./server/src/main/resources/database/P_LIST_SESSION_QUESTIONS.sql:/docker-entrypoint-initdb.d/66-P_LIST_SESSION_QUESTIONS.sql:ro
      - ./server/src/main/resources/database/P_UPSERT_SESSION_ANSWER.sql:/docker-entrypoint-initdb.d/67-P_UPSERT_SESSION_ANSWER.sql:ro
      - ./server/src/main/resources/database/P_LIST_SESSION_ANSWERS.sql:/docker-entrypoint-initdb.d/68-P_LIST_SESSION_ANSWERS.sql:ro
      - ./server/src/main/resources/database/P_COUNT_ANSWERS_FOR_QUESTION.sql:/docker-entrypoint-initdb.d/69-P_COUNT_ANSWERS_FOR_QUESTION.sql:ro
      - ./server/src/main/resources/database/P_LIST_USER_PAIR_SESSIONS.sql:/docker-entrypoint-initdb.d/70-P_LIST_USER_PAIR_SESSIONS.sql:ro
      - ./server/src/main/resources/database/P_LIST_PREVIOUSLY_ASKED_QUESTION_REFS.sql:/docker-entrypoint-initdb.d/71-P_LIST_PREVIOUSLY_ASKED_QUESTION_REFS.sql:ro
      - ./server/src/main/resources/database/P_INSERT_ACTIVITY_EVENT.sql:/docker-entrypoint-initdb.d/72-P_INSERT_ACTIVITY_EVENT.sql:ro
      - ./server/src/main/resources/database/P_LIST_ACTIVITY_EVENTS.sql:/docker-entrypoint-initdb.d/73-P_LIST_ACTIVITY_EVENTS.sql:ro
      - ./server/src/main/resources/database/P_COUNT_ACTIVITY_EVENTS.sql:/docker-entrypoint-initdb.d/74-P_COUNT_ACTIVITY_EVENTS.sql:ro
      - ./server/src/main/resources/database/P_ADMIN_DASHBOARD_STATS.sql:/docker-entrypoint-initdb.d/75-P_ADMIN_DASHBOARD_STATS.sql:ro
      - ./server/src/main/resources/database/P_LIST_USERS_ADMIN.sql:/docker-entrypoint-initdb.d/76-P_LIST_USERS_ADMIN.sql:ro
      - ./server/src/main/resources/database/P_LIST_SESSIONS_ADMIN.sql:/docker-entrypoint-initdb.d/77-P_LIST_SESSIONS_ADMIN.sql:ro
      - ./server/src/main/resources/database/P_COUNT_SESSIONS_ADMIN.sql:/docker-entrypoint-initdb.d/78-P_COUNT_SESSIONS_ADMIN.sql:ro
      - ./server/src/main/resources/database/P_GET_SESSION_ADMIN_BY_CODE.sql:/docker-entrypoint-initdb.d/79-P_GET_SESSION_ADMIN_BY_CODE.sql:ro
      - ./server/src/main/resources/database/P_LIST_SESSION_QUESTIONS_ADMIN.sql:/docker-entrypoint-initdb.d/80-P_LIST_SESSION_QUESTIONS_ADMIN.sql:ro
      - ./server/src/main/resources/database/P_ADMIN_QUESTION_RANKING.sql:/docker-entrypoint-initdb.d/81-P_ADMIN_QUESTION_RANKING.sql:ro
      - ./server/src/main/resources/database/P_ADMIN_ANALYTICS_INSIGHTS.sql:/docker-entrypoint-initdb.d/82-P_ADMIN_ANALYTICS_INSIGHTS.sql:ro
      - ./server/src/main/resources/database/P_ADMIN_CATEGORY_BREAKDOWN.sql:/docker-entrypoint-initdb.d/83-P_ADMIN_CATEGORY_BREAKDOWN.sql:ro
    networks:
      - getting2know
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d getting2know"]
      interval: 5s
      timeout: 5s
      retries: 10

  server:
    build: ./server
    container_name: getting2know-api
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: getting2know
      DB_USER: postgres
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
    networks:
      - getting2know
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s

  client:
    build:
      context: ./client
      args:
        VITE_API_URL: ""
    container_name: getting2know-web
    ports:
      - "127.0.0.1:3000:80"
    networks:
      - getting2know
    restart: unless-stopped
    depends_on:
      server:
        condition: service_healthy

networks:
  getting2know:
    driver: bridge

volumes:
  postgres_data:
