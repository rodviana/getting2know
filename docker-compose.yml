services:
  postgres:
    image: postgres:15-alpine
    container_name: getting2know-db
    environment:
      POSTGRES_DB: getting2know
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./server/src/main/resources/database/V001_schema_users.sql:/docker-entrypoint-initdb.d/10-V001_schema_users.sql:ro
      - ./server/src/main/resources/database/P_FIND_USER_BY_EMAIL.sql:/docker-entrypoint-initdb.d/20-P_FIND_USER_BY_EMAIL.sql:ro
      - ./server/src/main/resources/database/V002_seed_demo.sql:/docker-entrypoint-initdb.d/30-V002_seed_demo.sql:ro
    networks:
      - getting2know
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d getting2know"]
      interval: 5s
      timeout: 5s
      retries: 10

  server:
    build: ./server
    container_name: getting2know-api
    ports:
      - "8080:8080"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: getting2know
      DB_USER: postgres
      DB_PASSWORD: postgres
      JWT_SECRET: getting2know-docker-secret-key-min-32-chars!!
      CORS_ALLOWED_ORIGINS: http://localhost:3000,http://localhost:5173
    networks:
      - getting2know
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s

  client:
    build:
      context: ./client
      args:
        VITE_API_URL: ""
    container_name: getting2know-web
    ports:
      - "3000:80"
    networks:
      - getting2know
    depends_on:
      server:
        condition: service_healthy

networks:
  getting2know:
    driver: bridge

volumes:
  postgres_data:
